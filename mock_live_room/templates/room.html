<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>直播间 {{ match_id }}</title>
  <style>
    :root {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef2f8;
      color: #162033;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
    }
    .stage {
      background: #101827;
      color: #ffffff;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
    }
    header {
      padding: 20px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
    }
    h1 {
      margin: 0;
      font-size: 20px;
    }
    .screen {
      display: grid;
      place-items: center;
      font-size: 18px;
      color: #cfd8e6;
    }
    .stage footer {
      padding: 16px 24px;
      color: #aebbd0;
    }
    aside {
      background: #ffffff;
      border-left: 1px solid #d5ddea;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
    }
    .chat-head {
      padding: 18px 18px 14px;
      border-bottom: 1px solid #e1e7f0;
      font-weight: 700;
    }
    #messages {
      list-style: none;
      margin: 0;
      padding: 12px;
      overflow: auto;
    }
    .message {
      padding: 10px 8px;
      border-bottom: 1px solid #edf1f6;
    }
    .meta {
      display: flex;
      gap: 8px;
      color: #65738a;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .content {
      color: #172033;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .chat-actions {
      padding: 12px;
      border-top: 1px solid #e1e7f0;
      display: flex;
      gap: 10px;
    }
    button, a {
      min-height: 38px;
      padding: 0 12px;
      border: 0;
      border-radius: 6px;
      background: #185abc;
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    button.stop {
      background: #b3261e;
    }
    a {
      background: #2f3b52;
    }
    @media (max-width: 820px) {
      body {
        grid-template-columns: 1fr;
      }
      .stage {
        min-height: 42vh;
      }
      aside {
        min-height: 58vh;
      }
    }
  </style>
</head>
<body>
  <section class="stage">
    <header>
      <h1>直播间 {{ match_id }}</h1>
      <span id="count">0 条</span>
    </header>
    <div class="screen">LIVE</div>
    <footer id="state">连接中</footer>
  </section>
  <aside>
    <div class="chat-head">聊天</div>
    <ul id="messages"></ul>
    <div class="chat-actions">
      <button id="stopButton" class="stop" type="button">停止</button>
      <a href="/">返回</a>
    </div>
  </aside>

  <script>
    const matchId = "{{ match_id }}";
    const list = document.querySelector("#messages");
    const count = document.querySelector("#count");
    const state = document.querySelector("#state");
    const stopButton = document.querySelector("#stopButton");

    function render(messages) {
      list.innerHTML = messages.map((message) => `
        <li class="message">
          <div class="meta">
            <span>${message.bot_name || "机器人"}</span>
            <span>${message.match_time || ""}</span>
          </div>
          <div class="content">${message.content || ""}</div>
        </li>
      `).join("");
      count.textContent = `${messages.length} 条`;
      list.scrollTop = list.scrollHeight;
    }

    async function loadMessages() {
      const params = new URLSearchParams({ matchId, limit: "80" });
      const response = await fetch(`/api/messages?${params.toString()}`);
      const data = await response.json();
      render(data.messages || []);
      state.textContent = response.ok ? "已连接" : "连接失败";
    }

    stopButton.addEventListener("click", async () => {
      const params = new URLSearchParams({ matchId });
      await fetch(`/api/stop?${params.toString()}`);
      state.textContent = "已停止";
    });

    loadMessages();
    setInterval(loadMessages, 1500);
  </script>
</body>
</html>
